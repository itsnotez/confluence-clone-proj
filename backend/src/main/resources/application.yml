spring:
  profiles:
    active: local
  application:
    name: wiki
  datasource:
    url: jdbc:postgresql://localhost:5432/wikidb
    username: wikiuser
    password: wikipass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  batch:
    job:
      enabled: false

jwt:
  secret: ${JWT_SECRET:thisIsAVeryLongSecretKeyForJwtTokenGenerationAtLeast256BitsLong!}
  access-token-expiry-ms: 3600000
  refresh-token-expiry-ms: 604800000

storage:
  s3:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: wiki-attachments
    region: us-east-1

aes:
  secret-key: ${AES_SECRET_KEY:WikiAesKey256BitSecretKey1234567}
  iv: ${AES_IV:WikiAesIV16Bytes}

server:
  port: 8080
  servlet:
    context-path: /api
